{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <h2 class="mb-3">Leads</h2>

    <!-- Search -->
    <form method="get" class="mb-3">
        <input type="text"
               name="q"
               value="{{ query }}"
               placeholder="Search by Name / Phone / Email"
               class="form-control d-inline w-50">
        <button type="submit" class="btn btn-primary ms-2">Search</button>
    </form>

    <!-- Table -->
    <div class="table-responsive">
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th>Created</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
            {% for lead in leads %}
                <tr>
                    <td>{{ lead.name }}</td>
                    <td>{{ lead.email }}</td>
                    <td>{{ lead.phone }}</td>
                    <td>{{ lead.get_status_display }}</td>
                    <td>{{ lead.created_at|date:"M d, Y h:i A" }}</td>
                    <td>
                        <!-- ✅ THIS WAS MISSING -->
                        <a href="{% url 'leads:lead_edit' lead.id %}"
                           class="btn btn-sm btn-warning">
                            Edit
                        </a>
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="6" class="text-center">No leads found</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
