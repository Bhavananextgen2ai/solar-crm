{% extends "base.html" %}

{% block content %}

<div class="container mt-4">
    <h2 class="mb-4">Dashboard</h2>

    <!-- Summary Card -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Total Leads</h5>
            <h3>{{ total_leads }}</h3>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="mb-4">
        <a href="{% url 'leads:add_lead' %}" class="btn btn-success me-2">
            Add New Lead
        </a>

        <a href="{% url 'leads:record_payment' %}" class="btn btn-primary">
            Record Payment
        </a>
    </div>

    <!-- Status Summary -->
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Leads by Status</h5>

            <table class="table table-bordered mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>Status</th>
                        <th>Count</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in status_counts %}
                    <tr>
                        <td>{{ item.status }}</td>
                        <td>{{ item.count }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="2" class="text-center text-muted">
                            No data available
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

        </div>
    </div>
</div>

{% endblock %}
