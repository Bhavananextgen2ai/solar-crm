{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-warning">
            <h4>Edit Lead</h4>
        </div>

        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="row g-3">

                    <div class="col-md-6">
                        <label>Name</label>
                        {{ form.name }}
                    </div>

                    <div class="col-md-6">
                        <label>Email</label>
                        {{ form.email }}
                    </div>

                    <div class="col-md-6">
                        <label>Phone</label>
                        {{ form.phone }}
                    </div>

                    <div class="col-md-6">
                        <label>Status</label>
                        {{ form.status }}
                    </div>

                    <div class="col-md-6">
                        <label>Follow Up Date</label>
                        {{ form.follow_up_date }}
                    </div>

                    <div class="col-md-6">
                        <label>Follow Up Time</label>
                        {{ form.follow_up_time }}
                    </div>

                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-success">Update</button>
                    <a href="{% url 'leads:lead_list' %}"
                       class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
