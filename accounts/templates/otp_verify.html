{% extends "base.html" %}

{% block content %}
<div class="container mt-5" style="max-width: 400px;">
    <h4 class="text-center">OTP Verification</h4>

    {% for message in messages %}
        <div class="alert alert-danger">{{ message }}</div>
    {% endfor %}

    <form method="post">
        {% csrf_token %}
        <input type="text" name="otp" class="form-control mb-3"
               placeholder="Enter 6-digit OTP" required>

        <button class="btn btn-success w-100">Verify OTP</button>
    </form>
</div>
{% endblock %}
